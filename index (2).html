<style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Trebuchet MS', sans-serif; }
    
    body {
        background-color: #0a0f0a;
        color: #f5f0e8;
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
        padding: 40px 20px 100px;
        transition: all 0.3s ease;
    }

    #menuBtn {
        position: fixed; top: 16px; left: 16px;
        background: #0f1f0f; border: 1px solid #c9a84c;
        border-radius: 10px; padding: 10px 14px;
        cursor: pointer; font-size: 20px; color: #c9a84c;
        z-index: 1000; width: auto; max-width: none; margin: 0;
        touch-action: manipulation;
    }

    #overlay {
        display: none; position: fixed; top: 0; left: 0;
        width: 100%; height: 100%;
        background: rgba(0,0,0,0.7); z-index: 998;
    }
    #overlay.show { display: block; }

    #sidebar {
        position: fixed; top: 0; left: -290px;
        width: 270px; height: 100%;
        background: #0a0f0a; border-right: 1px solid #c9a84c;
        z-index: 999; transition: left 0.3s ease;
        padding: 80px 20px 20px; overflow-y: auto;
    }
    #sidebar.show { left: 0; }

    .sidebar-title { font-size: 11px; color: #6a8a6a; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 20px; }
    .sidebar-divider { border: none; border-top: 1px solid #1a3a2a; margin: 14px 0; }

    .sidebar-btn {
        width: 100%; padding: 14px 18px;
        border-radius: 14px; border: 1px solid #1a3a2a;
        background: #0f1f0f; color: #c9a84c;
        font-size: 15px; font-weight: bold; cursor: pointer;
        margin-bottom: 10px; text-align: left;
        letter-spacing: 1px; display: flex; align-items: center;
        gap: 12px; max-width: none;
        touch-action: manipulation;
        -webkit-tap-highlight-color: transparent;
    }
    .sidebar-btn:hover, .sidebar-btn:active { border-color: #c9a84c; background: #122212; }

    #settingsPage { display: none; width: 100%; max-width: 360px; }
    #settingsPage.show { display: block; }
    #historyPage { display: none; width: 100%; max-width: 360px; }
    #historyPage.show { display: block; }
    #coinPage { display: none; width: 100%; max-width: 360px; }
    #coinPage.show { display: block; }
    #dicePage { display: none; width: 100%; max-width: 360px; }
    #dicePage.show { display: block; }
    #mainPage { width: 100%; display: flex; flex-direction: column; align-items: center; }
    #mainPage.hide { display: none; }

    .page-title {
        font-size: 26px; color: #c9a84c;
        letter-spacing: 3px; text-transform: uppercase;
        margin-bottom: 28px; text-align: center;
    }

    .settings-section {
        background: #0f1f0f; border: 1px solid #1a3a2a;
        border-radius: 20px; padding: 20px; margin-bottom: 18px;
    }
    .settings-label { font-size: 12px; color: #6a8a6a; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 14px; }
    .lang-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .lang-btn {
        padding: 11px 8px; border-radius: 12px;
        border: 1px solid #1a3a2a; background: #0a0f0a;
        color: #f5f0e8; font-size: 13px; cursor: pointer;
        text-align: center; max-width: none; width: auto;
        margin: 0; letter-spacing: 0;
        touch-action: manipulation;
    }
    .lang-btn.active { border-color: #c9a84c; color: #c9a84c; background: #0f1f0f; }

    .toggle-row { display: flex; justify-content: space-between; align-items: center; }
    .toggle-label { font-size: 15px; color: #f5f0e8; }
    .toggle {
        width: 50px; height: 26px; background: #1a3a2a;
        border-radius: 13px; cursor: pointer; position: relative;
        transition: background 0.3s; border: 1px solid #c9a84c;
        flex-shrink: 0;
    }
    .toggle.on { background: #c9a84c; }
    .toggle-circle {
        position: absolute; top: 3px; left: 3px;
        width: 18px; height: 18px; background: #f5f0e8;
        border-radius: 50%; transition: left 0.3s;
    }
    .toggle.on .toggle-circle { left: 27px; }

    .history-item {
        background: #0f1f0f; border: 1px solid #c9a84c;
        border-radius: 15px; padding: 14px 18px; margin-bottom: 10px;
    }
    .history-result { font-size: 18px; font-weight: bold; color: #f0c040; }
    .history-options { font-size: 12px; color: #6a8a6a; margin-top: 5px; }
    .history-time { font-size: 11px; color: #3a5a3a; margin-top: 5px; }
    .no-history { text-align: center; color: #6a8a6a; font-size: 14px; margin-top: 40px; }

    h1 { font-size: 42px; color: #c9a84c; margin-bottom: 8px; letter-spacing: 4px; text-transform: uppercase; text-align: center; }
    #tagline { font-size: 13px; color: #6a8a6a; margin-bottom: 28px; letter-spacing: 2px; text-align: center; }

    input[type="text"] {
        width: 100%; max-width: 340px; padding: 14px 18px;
        border-radius: 18px; border: 1px solid #c9a84c;
        background: #0f1f0f; color: #f5f0e8;
        font-size: 16px; margin-bottom: 12px; outline: none;
        -webkit-appearance: none;
        appearance: none;
    }
    input[type="text"]:focus { border-color: #f0c040; }

    button {
        width: 100%; max-width: 340px; padding: 14px;
        border-radius: 18px; border: none;
        font-size: 16px; font-weight: bold; cursor: pointer;
        margin-bottom: 12px; letter-spacing: 1px;
        touch-action: manipulation;
        -webkit-tap-highlight-color: transparent;
    }
    #addBtn { background: #0f1f0f; color: #c9a84c; border: 1px solid #1a3a2a; }
    #pickBtn {
        background: linear-gradient(135deg, #c9a84c, #f0c040);
        color: #0a0f0a; font-size: 18px; padding: 18px;
    }

    #optionsList { width: 100%; max-width: 340px; margin-bottom: 10px; }

    .wheel-wrap { position: relative; display: inline-block; margin: 10px 0; }
    canvas {
        border-radius: 50%; border: 3px solid #c9a84c;
        display: block;
        max-width: 100%;
        width: min(300px, calc(100vw - 60px));
        height: min(300px, calc(100vw - 60px));
    }

    #resultOverlay {
        display: none; position: fixed; top: 0; left: 0;
        width: 100%; height: 100%;
        background: rgba(0,0,0,0.90); z-index: 1001;
        flex-direction: column; align-items: center; justify-content: center;
        padding: 20px;
    }
    #resultOverlay.show { display: flex; }
    #resultBox {
        background: #0f1f0f; border: 3px solid #c9a84c;
        border-radius: 28px; padding: 36px 30px;
        text-align: center; max-width: 320px; width: 100%;
    }
    #resultEmoji { font-size: 56px; margin-bottom: 16px; }
    #resultLabel { font-size: 13px; color: #6a8a6a; margin-bottom: 8px; letter-spacing: 2px; text-transform: uppercase; }
    #resultText { font-size: 34px; font-weight: bold; color: #f0c040; margin-bottom: 26px; word-break: break-word; }
    #closeBtn {
        background: linear-gradient(135deg, #c9a84c, #f0c040) !important;
        color: #0a0f0a !important; border: none !important;
        border-radius: 18px; padding: 14px 36px;
        font-size: 16px; font-weight: bold; cursor: pointer;
        width: auto; max-width: none; letter-spacing: 1px; margin: 0;
    }

    #clearHistoryBtn {
        background: #0f1f0f; color: #ff4444;
        border: 1px solid #ff4444; border-radius: 14px;
        padding: 12px; font-size: 14px; cursor: pointer;
        width: 100%; max-width: 360px; margin-top: 10px; letter-spacing: 1px;
    }

    .coin-area { display: flex; flex-direction: column; align-items: center; gap: 20px; margin-top: 10px; }
    #coin {
        width: 140px; height: 140px; border-radius: 50%;
        border: 4px solid #c9a84c;
        display: flex; align-items: center; justify-content: center;
        font-size: 60px; background: #0f1f0f;
        transition: transform 0.1s; user-select: none;
    }
    #coin.flipping { animation: coinSpin 1.2s ease-out forwards; }
    @keyframes coinSpin {
        0%   { transform: rotateY(0deg) scale(1); }
        40%  { transform: rotateY(540deg) scale(1.15); }
        80%  { transform: rotateY(900deg) scale(0.95); }
        100% { transform: rotateY(1080deg) scale(1); }
    }
    #coinResult { font-size: 22px; font-weight: bold; color: #f0c040; min-height: 32px; letter-spacing: 2px; }
    #flipBtn {
        background: linear-gradient(135deg, #c9a84c, #f0c040);
        color: #0a0f0a; padding: 16px; font-size: 17px;
        border-radius: 18px; border: none; width: 100%;
        max-width: 340px; cursor: pointer; font-weight: bold; letter-spacing: 1px;
    }

    .dice-area { display: flex; flex-direction: column; align-items: center; gap: 24px; margin-top: 10px; }
    .dice-row { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; }
    .die {
        width: 90px; height: 90px; border-radius: 18px;
        border: 2px solid #c9a84c; background: #0f1f0f;
        display: flex; align-items: center; justify-content: center;
        font-size: 42px; transition: transform 0.1s;
    }
    .die.rolling { animation: diceShake 0.8s ease-out forwards; }
    @keyframes diceShake {
        0%,100% { transform: rotate(0deg) scale(1); }
        20% { transform: rotate(-15deg) scale(1.1); }
        40% { transform: rotate(15deg) scale(0.95); }
        60% { transform: rotate(-10deg) scale(1.05); }
        80% { transform: rotate(8deg) scale(1); }
    }
    #diceTotal { font-size: 20px; color: #6a8a6a; letter-spacing: 2px; }
    #diceTotal span { color: #f0c040; font-size: 26px; font-weight: bold; }
    .dice-count-row { display: flex; align-items: center; gap: 14px; }
    .dice-count-btn {
        width: 40px; height: 40px; border-radius: 12px;
        border: 1px solid #c9a84c; background: #0f1f0f;
        color: #c9a84c; font-size: 22px; cursor: pointer;
        display: flex; align-items: center; justify-content: center;
        font-weight: bold; padding: 0; margin: 0; max-width: none;
    }
    #diceCountLabel { font-size: 18px; color: #f5f0e8; min-width: 60px; text-align: center; }
    #rollBtn {
        background: linear-gradient(135deg, #c9a84c, #f0c040);
        color: #0a0f0a; padding: 16px; font-size: 17px;
        border-radius: 18px; border: none; width: 100%;
        max-width: 340px; cursor: pointer; font-weight: bold;
        letter-spacing: 1px; margin-bottom: 0;
    }

    .ad-slot {
        width: 100%; max-width: 360px;
        background: #0f1f0f; border: 1px dashed #1a3a2a;
        border-radius: 14px; padding: 16px;
        text-align: center; color: #3a5a3a;
        font-size: 12px; letter-spacing: 2px;
        text-transform: uppercase; margin: 16px 0;
        min-height: 90px; display: flex;
        align-items: center; justify-content: center;
    }
    .ad-slot ins { display: block; width: 100%; }

    @keyframes popIn {
        0% { transform: scale(0); opacity: 0; }
        70% { transform: scale(1.1); }
        100% { transform: scale(1); opacity: 1; }
    }
    .animate { animation: popIn 0.6s ease forwards; }

    @media (max-width: 400px) {
        h1 { font-size: 32px; }
        body { padding: 36px 14px 100px; }
        #resultText { font-size: 26px; }
        .die { width: 72px; height: 72px; font-size: 32px; }
    }
    @media (min-width: 700px) {
        body { padding: 60px 40px 120px; }
        input[type="text"], button { max-width: 400px; }
        #optionsList { max-width: 400px; }
        .ad-slot { max-width: 480px; }
    }
</style>
</head>

    <button class="sidebar-btn" onclick="showPage('dice')">🎲 Dice Roll</button>

</div>

<div id="mainPage">

    <button onclick="addOption()" id="addBtn">+ Add Option</button>
    <div id="optionsList"></div>
    <div class="wheel-wrap">
        <canvas id="wheelCanvas" width="300" height="300"></canvas>

    <button onclick="pickOption()" id="pickBtn">◈ Let VibePick Decide ◈</button>
    <div class="ad-slot" id="adBottom">advertisement</div>
</div>

<div id="coinPage">
    <div class="page-title">🪙 Coin Flip</div>
    <div class="ad-slot">advertisement</div>
    <div class="coin-area">
        <div id="coin">🪙</div>
        <div id="coinResult"></div>
        <button id="flipBtn" onclick="flipCoin()">Flip the Coin ◈</button>
    </div>
    <div class="ad-slot" style="margin-top:30px">advertisement</div>
</div>

<div id="dicePage">
    <div class="page-title">🎲 Dice Roll</div>
    <div class="ad-slot">advertisement</div>
    <div class="dice-area">
        <div class="dice-count-row">
            <button class="dice-count-btn" onclick="changeDiceCount(-1)">−</button>
            <div id="diceCountLabel">1 Die</div>
            <button class="dice-count-btn" onclick="changeDiceCount(1)">+</button>
        </div>
        <div class="dice-row" id="diceRow">
            <div class="die" id="die0">⚀</div>
        </div>
        <div id="diceTotal"></div>
        <button id="rollBtn" onclick="rollDice()">Roll the Dice ◈</button>
    </div>
    <div class="ad-slot" style="margin-top:30px">advertisement</div>
</div>

<div id="historyPage">
    <div class="page-title">◈ History</div>
    <div id="historyList"></div>
    <button id="clearHistoryBtn" onclick="clearHistory()">🗑 Clear History</button>
</div>

<div id="settingsPage">
    <div class="page-title">⚙ Settings</div>
    <div class="settings-section">
        <div class="settings-label">🌐 Language</div>
        <div class="lang-grid" id="langGrid">
            <button class="lang-btn active" onclick="setLanguage('en', this)">🇬🇧 English</button>
            <button class="lang-btn" onclick="setLanguage('bn', this)">🇧🇩 Bengali</button>
            <button class="lang-btn" onclick="setLanguage('ar', this)">🇸🇦 Arabic</button>
            <button class="lang-btn" onclick="setLanguage('hi', this)">🇮🇳 Hindi</button>
            <button class="lang-btn" onclick="setLanguage('es', this)">🇪🇸 Spanish</button>
            <button class="lang-btn" onclick="setLanguage('fr', this)">🇫🇷 French</button>
            <button class="lang-btn" onclick="setLanguage('ru', this)">🇷🇺 Russian</button>
            <button class="lang-btn" onclick="setLanguage('pt', this)">🇵🇹 Portuguese</button>
            <button class="lang-btn" onclick="setLanguage('zh', this)">🇨🇳 Chinese</button>
            <button class="lang-btn" onclick="setLanguage('de', this)">🇩🇪 German</button>
        </div>
    </div>
    <div class="settings-section">
        <div class="settings-label">🔊 Sound</div>
        <div class="toggle-row">
            <span class="toggle-label" id="soundLabel">Sound is ON</span>
            <div class="toggle on" id="soundToggle" onclick="toggleSound()">
                <div class="toggle-circle"></div>
            </div>
        </div>
    </div>
</div>

<div id="resultOverlay">
    <div id="resultBox">
        <div id="resultEmoji">◈</div>
        <div id="resultLabel">VibePick has chosen</div>
        <div id="resultText"></div>
        <button id="closeBtn" onclick="closeResult()">Pick Again ↺</button>
    </div>
</div>

function setLanguage(lang, btn) {
    currentLang = lang;
    const t = T[lang];
    document.getElementById("tagline").innerHTML = t.tagline;
    document.getElementById("optionInput").placeholder = t.placeholder;
    document.getElementById("addBtn").innerHTML = t.addBtn;
    document.getElementById("pickBtn").innerHTML = t.pickBtn;
    document.getElementById("resultLabel").innerHTML = t.resultLabel;
    document.getElementById("closeBtn").innerHTML = t.pickAgain;
    document.getElementById("soundLabel").innerHTML = soundOn ? t.soundOn : t.soundOff;
    document.getElementById("clearHistoryBtn").innerHTML = t.clearHistory;
    document.getElementById("flipBtn").innerHTML = t.flipBtn;
    document.getElementById("rollBtn").innerHTML = t.rollBtn;
    document.querySelectorAll(".lang-btn").forEach(b => b.classList.remove("active"));
    if (btn) btn.classList.add("active");
    updateList(); renderHistory();
}

function toggleSidebar() { document.getElementById("sidebar").classList.toggle("show"); document.getElementById("overlay").classList.toggle("show"); }
function closeSidebar() { document.getElementById("sidebar").classList.remove("show"); document.getElementById("overlay").classList.remove("show"); }
function showPage(page) {
    ['main','history','settings','coin','dice'].forEach(p => {
        const el = document.getElementById(p+'Page');
        el.className = p === 'main' ? (page==='main'?'':'hide') : (page===p?'show':'');
    });
    if (page==='history') renderHistory();
    closeSidebar(); window.scrollTo(0,0);
}

function toggleSound() {
    soundOn = !soundOn;
    document.getElementById("soundToggle").classList.toggle("on");
    document.getElementById("soundLabel").innerHTML = soundOn ? T[currentLang].soundOn : T[currentLang].soundOff;
}
function playSpinSound() { if(!soundOn)return; try{ const a=new AudioContext(); for(let i=0;i<30;i++){const o=a.createOscillator(),g=a.createGain();o.connect(g);g.connect(a.destination);o.type="square";const s=i/30,t=a.currentTime+i*(0.15-s*0.12);o.frequency.setValueAtTime(800,t);g.gain.setValueAtTime(0.08,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.04);o.start(t);o.stop(t+0.04);} }catch(e){} }
function playResultSound() { if(!soundOn)return; try{ const a=new AudioContext();[0,0.15,0.3].forEach(t=>{const o=a.createOscillator(),g=a.createGain();o.connect(g);g.connect(a.destination);o.type="sine";o.frequency.setValueAtTime(400,a.currentTime+t);o.frequency.setValueAtTime(600,a.currentTime+t+0.05);o.frequency.setValueAtTime(900,a.currentTime+t+0.1);g.gain.setValueAtTime(0.3,a.currentTime+t);g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+t+0.3);o.start(a.currentTime+t);o.stop(a.currentTime+t+0.3);}); }catch(e){} }
function playClickSound() { if(!soundOn)return; try{ const a=new AudioContext(),o=a.createOscillator(),g=a.createGain();o.connect(g);g.connect(a.destination);o.type="sine";o.frequency.setValueAtTime(600,a.currentTime);g.gain.setValueAtTime(0.2,a.currentTime);g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+0.12);o.start();o.stop(a.currentTime+0.12); }catch(e){} }

function handleEnter(e) { if(e.key==="Enter") addOption(); }
function addOption() {
    const input=document.getElementById("optionInput"), option=input.value.trim();
    if(!option){alert(T[currentLang].typeFirst);return;}
    options.push(option); input.value=""; updateList(); playClickSound();
}
function updateList() {
    document.getElementById("optionsList").innerHTML = options.map((opt,i)=>
        `<div style="background:#0f1f0f;border:1px solid #c9a84c;border-radius:14px;padding:11px 18px;margin-bottom:9px;display:flex;justify-content:space-between;align-items:center;">
            <span style="color:#f5f0e8;font-size:15px;">◈ ${opt}</span>
            <span onclick="removeOption(${i})" style="color:#c9a84c;cursor:pointer;font-size:18px;padding:4px 8px;">✕</span>
        </div>`).join('');
    drawWheel();
}
function removeOption(i) { options.splice(i,1); updateList(); }

function drawWheel(angle=0) {
    const canvas=document.getElementById("wheelCanvas");
    const size=Math.min(300,window.innerWidth-60);
    canvas.width=size; canvas.height=size;
    const ctx=canvas.getContext("2d"), cx=size/2, cy=size/2, r=size/2-6;
    ctx.clearRect(0,0,size,size);
    if(!options.length) return;
    const colors=["#1a3a2a","#0f2a1a","#2a4a3a","#0a1f0a","#3a5a4a","#152a1a"];
    const slice=(2*Math.PI)/options.length;
    options.forEach((opt,i)=>{
        const start=i*slice+angle, end=start+slice;
        ctx.beginPath(); ctx.moveTo(cx,cy); ctx.arc(cx,cy,r,start,end); ctx.closePath();
        ctx.fillStyle=colors[i%colors.length]; ctx.fill();
        ctx.strokeStyle="#c9a84c"; ctx.lineWidth=2; ctx.stroke();
        ctx.save(); ctx.translate(cx,cy); ctx.rotate(start+slice/2);
        ctx.textAlign="right"; ctx.fillStyle="#c9a84c";
        ctx.font=`bold ${Math.max(10,Math.min(13,size/24))}px Trebuchet MS`;
        ctx.fillText(opt.substring(0,10),r-10,5); ctx.restore();
    });
    ctx.beginPath(); ctx.arc(cx,cy,18,0,2*Math.PI); ctx.fillStyle="#c9a84c"; ctx.fill();
    ctx.beginPath(); ctx.moveTo(cx+r+4,cy); ctx.lineTo(cx+r+24,cy-10); ctx.lineTo(cx+r+24,cy+10); ctx.closePath(); ctx.fillStyle="#c9a84c"; ctx.fill();
}

function pickOption() {
    const t=T[currentLang];
    if(!options.length){alert(t.addFirst);return;}
    if(options.length<2){alert(t.addTwo);return;}
    if(spinning) return;
    spinning=true; playSpinSound();
    const totalRot=Math.random()*360+1440, duration=4000; let start=null;
    function animate(ts) {
        if(!start) start=ts;
        const p=ts-start, ease=1-Math.pow(1-p/duration,3);
        currentAngle=totalRot*ease*Math.PI/180; drawWheel(currentAngle);
        if(p<duration){ requestAnimationFrame(animate); }
        else {
            spinning=false;
            const slice=(2*Math.PI)/options.length;
            const norm=(2*Math.PI)-(currentAngle%(2*Math.PI));
            showResult(options[Math.floor(norm/slice)%options.length],'🎯');
        }
    }
    requestAnimationFrame(animate);
}

function showResult(picked, emoji) {
    const now=new Date();
    history.push({result:picked, options:[...options], time:now.toLocaleTimeString()+' '+now.toLocaleDateString()});
    document.getElementById("resultText").innerHTML=picked;
    document.getElementById("resultEmoji").innerHTML=emoji||'◈';
    document.getElementById("resultLabel").innerHTML=T[currentLang].resultLabel;
    const overlay=document.getElementById("resultOverlay"), box=document.getElementById("resultBox");
    overlay.classList.add("show"); box.classList.remove("animate"); void box.offsetWidth; box.classList.add("animate");
    playResultSound();
}
function closeResult() { document.getElementById("resultOverlay").classList.remove("show"); }

function renderHistory() {
    const t=T[currentLang], list=document.getElementById("historyList");
    if(!history.length){list.innerHTML=`<div class="no-history">${t.noHistory}</div>`;return;}
    list.innerHTML=history.slice().reverse().map(item=>
        `<div class="history-item"><div class="history-result">◈ ${item.result}</div><div class="history-options">${item.options.join(' vs ')}</div><div class="history-time">${item.time}</div></div>`).join('');
}
function clearHistory() { history=[]; renderHistory(); }

function flipCoin() {
    if(coinFlipping) return; coinFlipping=true;
    const coin=document.getElementById("coin"), result=document.getElementById("coinResult"), t=T[currentLang];
    result.innerHTML=''; coin.classList.remove("flipping"); void coin.offsetWidth; coin.classList.add("flipping");
    playSpinSound();
    setTimeout(()=>{
        const heads=Math.random()<0.5;
        coin.innerHTML=heads?'🌕':'🌑'; result.innerHTML=heads?t.heads:t.tails;
        const now=new Date();
        history.push({result:heads?t.heads:t.tails,options:[t.heads,t.tails],time:now.toLocaleTimeString()+' '+now.toLocaleDateString()});
        coinFlipping=false; playResultSound();
    },1250);
}

function changeDiceCount(delta) {
    diceCount=Math.max(1,Math.min(6,diceCount+delta));
    diceValues=Array(diceCount).fill(1);
    document.getElementById("diceCountLabel").innerHTML=diceCount===1?'1 Die':diceCount+' Dice';
    renderDice(); document.getElementById("diceTotal").innerHTML='';
}
function renderDice() {
    document.getElementById("diceRow").innerHTML=diceValues.map((v,i)=>
        `<div class="die" id="die${i}">${DICE_FACES[v-1]}</div>`).join('');
}
function rollDice() {
    if(diceRolling) return; diceRolling=true;
    document.getElementById("diceTotal").innerHTML=''; playSpinSound();
    const dice=document.querySelectorAll(".die");
    dice.forEach(d=>{d.classList.remove("rolling");void d.offsetWidth;d.classList.add("rolling");});
    const interval=setInterval(()=>{ dice.forEach(d=>d.innerHTML=DICE_FACES[Math.floor(Math.random()*6)]); },80);
    setTimeout(()=>{
        clearInterval(interval);
        diceValues=Array.from({length:diceCount},()=>Math.floor(Math.random()*6)+1);
        dice.forEach((d,i)=>{d.innerHTML=DICE_FACES[diceValues[i]-1];d.classList.remove("rolling");});
        const total=diceValues.reduce((a,b)=>a+b,0);
        document.getElementById("diceTotal").innerHTML=diceCount>1?`Total: <span>${total}</span>`:'';
        const now=new Date();
        history.push({result:diceValues.join(', '),options:['🎲 Dice'],time:now.toLocaleTimeString()+' '+now.toLocaleDateString()});
        diceRolling=false; playResultSound();
    },900);
}

window.addEventListener('resize',()=>{ if(options.length) drawWheel(currentAngle); });
drawWheel();
</script>
